services:
  - type: web
    name: levadinha-site
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: JWT_SECRET
        generateValue: true
      - key: PREMIUM_USERNAME
        value: Levadinha
      - key: PREMIUM_PASSWORD
        value: levadinha

