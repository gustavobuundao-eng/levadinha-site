<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Painel Premium | Levadinha Advocacia Habbo</title>
    <link rel="icon" type="image/png" href="assets/levadinha-favicon.png" />
    <link rel="apple-touch-icon" href="assets/levadinha-favicon.png" />
    <link rel="preload" href="assets/levadinha-logo-novo.png" as="image" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body id="top" class="panel-document">
    <canvas id="particleCanvas" class="particle-canvas" aria-hidden="true"></canvas>
    <div class="sparkle-layer" aria-hidden="true"></div>

    <header class="site-header">
      <a class="brand" href="/pagina-principal" aria-label="Voltar para o inicio">
        <img src="assets/levadinha-logo-novo.png" alt="Levadinha" decoding="async" />
      </a>
      <nav class="main-nav" aria-label="Navegacao principal">
        <a href="/pagina-principal">Inicio</a>
        <a href="/conta">Conta</a>
        <a class="is-active premium-only" href="/painel">Painel</a>
      </nav>
      <div class="header-actions">
        <a class="developer-link premium-only" href="/painel?dev=1">Modo desenvolvedor</a>
        <span class="header-status">Gabinete online</span>
      </div>
    </header>

    <main class="panel-page">
      <section class="admin-section">
        <div class="section-heading">
          <p>Premium</p>
          <h1>Painel da Levadinha</h1>
        </div>
        <div id="adminPanel" class="admin-panel">
          <section class="panel-block">
            <div class="admin-toolbar">
              <h3>Gabinete privado</h3>
              <button id="clearCases" class="button danger" type="button">Limpar painel</button>
            </div>
            <div id="caseList" class="case-list"></div>
          </section>

          <section class="panel-block">
            <div class="admin-toolbar denunciation-toolbar">
              <h3>Denuncias recebidas</h3>
            </div>
            <div id="denunciationInbox" class="case-list"></div>
          </section>

          <section id="accountsManager" class="panel-block">
            <div class="admin-toolbar site-editor-toolbar">
              <h3>Gerenciamento de contas</h3>
            </div>
            <div id="accountsList" class="case-list"></div>
          </section>
        </div>
      </section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="src/services/storage.js"></script>
    <script src="src/services/auth.js"></script>
    <script src="src/services/users.js"></script>
    <script src="src/services/cases.js"></script>
    <script src="src/services/posts.js"></script>
    <script src="src/modules/admin.js"></script>
    <script src="src/modules/devmode.js"></script>
    <script src="src/utils/dom.js"></script>
    <script src="script.js"></script>
  </body>
</html>
